name: Daily Reminders
on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        env:
          APP_URL: https://iu-mycampus.me/api/cron/daily-reminders?secret=
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: 
          curl -fsSL "${APP_URL}/api/cron/daily-reminders?secret=${CRON_SECRET}"
