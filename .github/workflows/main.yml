name: Daily Reminders

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call reminder endpoint
        env:
          APP_URL: https://iu-mycampus.me
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering Daily Reminder CRON..."
          echo "Endpoint: ${APP_URL}/api/cron/daily-reminders"
          
          # Call your cron endpoint
          curl -v "${APP_URL}/api/cron/daily-reminders?secret=${CRON_SECRET}"
