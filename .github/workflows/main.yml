name: Daily Reminders

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily reminders
        env:
          APP_URL: https://iu-mycampus.me
          CRON_SECRET: ${{ secrets.CRON_SECRET }} # must match your app env
        run: |
          set -euo pipefail
          echo "Calling ${APP_URL}/api/cron/daily-reminders"
          curl -f -sS -H "x-vercel-cron: 1" \
            "${APP_URL}/api/cron/daily-reminders?secret=${CRON_SECRET}"
